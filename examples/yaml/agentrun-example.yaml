---
# Example AgentRun - Trigger a single agent run with a specific task
# Apply: kubectl apply -f agentrun-example.yaml
# Watch progress: kubectl get agentrun alice-run-001 -w
# View results: kubectl get agentrun alice-run-001 -o yaml
apiVersion: sympozium.ai/v1alpha1
kind: AgentRun
metadata:
  name: alice-run-001
  namespace: default
spec:
  instanceRef: alice
  agentID: primary
  sessionKey: "session-abc123"
  task: "Review the latest pull request and provide feedback on code quality"
  model:
    name: gpt-4o
    provider: openai
    maxTokens: 128000
  sandbox:
    enabled: true
    image: ghcr.io/kasdk3/sympozium/sandbox:latest
  skills:
    - code-review
  toolPolicy:
    allowed:
      - read_file
      - grep_search
      - list_dir
    denied:
      - exec_command
    requireApproval:
      - write_file
  timeout: "10m"
  cleanup: OnFailure
